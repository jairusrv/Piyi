name: piyi_mobile
description: Piyí mobile app
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  go_router: ^14.2.7
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  device_info_plus: ^10.1.2
  uuid: ^4.5.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  piyi_ui:
    path: packages/piyi_ui

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
